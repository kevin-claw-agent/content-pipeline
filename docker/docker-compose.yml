version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: content-pipeline-db
    environment:
      POSTGRES_USER: content_pipeline
      POSTGRES_PASSWORD: content_pipeline
      POSTGRES_DB: content_pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content_pipeline -d content_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: content-pipeline-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: content-pipeline-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create MinIO bucket on startup
  minio-init:
    image: minio/minio:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 10 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/content-pipeline --ignore-existing
      "

  # API Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-pipeline-api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://content_pipeline:content_pipeline@postgres:5432/content_pipeline
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=content-pipeline
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Script Agent Worker
  worker-script:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-pipeline-worker-script
    command: npm run worker:script
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://content_pipeline:content_pipeline@postgres:5432/content_pipeline
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=content-pipeline
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

  # Visual Agent Worker
  worker-visual:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-pipeline-worker-visual
    command: npm run worker:visual
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://content_pipeline:content_pipeline@postgres:5432/content_pipeline
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=content-pipeline
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

  # Render Agent Worker
  worker-render:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-pipeline-worker-render
    command: npm run worker:render
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://content_pipeline:content_pipeline@postgres:5432/content_pipeline
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=content-pipeline
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

  # Composer Worker
  worker-composer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-pipeline-worker-composer
    command: npx tsx src/workers/composer.ts
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://content_pipeline:content_pipeline@postgres:5432/content_pipeline
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=content-pipeline
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1

volumes:
  postgres_data:
  redis_data:
  minio_data:
