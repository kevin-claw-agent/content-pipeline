name: Deploy to Staging

on:
  push:
    branches: [test]
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
  DEPLOY_USER: ${{ secrets.STAGING_USER }}
  DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
  DEPLOY_PATH: ${{ secrets.STAGING_PATH || '/opt/content-pipeline' }}

jobs:
  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.STAGING_SSH_KEY }}
          known_hosts: ${{ secrets.STAGING_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Deploy to staging server
        run: |
          echo "Deploying to staging environment..."
          
          # Create deployment script
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/content-pipeline}"
          
          echo "=== Starting Staging Deployment ==="
          
          # Navigate to deploy directory
          cd $DEPLOY_PATH
          
          # Pull latest changes
          echo "Pulling latest changes..."
          git fetch origin
          git checkout test
          git pull origin test
          
          # Create/update .env file
          echo "Setting up environment..."
          cat > .env << EOL
          NODE_ENV=staging
          PORT=3000
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          S3_ENDPOINT=${{ secrets.STAGING_S3_ENDPOINT }}
          S3_BUCKET=${{ secrets.STAGING_S3_BUCKET }}
          S3_ACCESS_KEY=${{ secrets.STAGING_S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.STAGING_S3_SECRET_KEY }}
          EOL
          
          # Build and restart services
          echo "Building application..."
          docker-compose -f docker/docker-compose.yml down
          docker-compose -f docker/docker-compose.yml pull
          docker-compose -f docker/docker-compose.yml up -d --build
          
          # Run migrations if needed
          echo "Running database migrations..."
          npm install
          npm run build
          
          # Health check
          echo "Performing health check..."
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          
          echo "=== Staging Deployment Complete ==="
          EOF
          
          chmod +x deploy.sh
          
          # Copy and execute deployment script
          scp deploy.sh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/deploy.sh
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} 'bash /tmp/deploy.sh'
          
      - name: Health Check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          # Perform health check (adjust URL as needed)
          for i in {1..5}; do
            if curl -sf ${{ secrets.STAGING_HEALTH_URL || 'http://staging.yourdomain.com/health' }}; then
              echo "✅ Staging deployment is healthy"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed"
          exit 1
        continue-on-error: true

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Staging deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
